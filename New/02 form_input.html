<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modue02: Input, button</title>
</head>
<body>
    
    <label for="f_name">Your first name</label>
    <input type="text" placeholder="John Doe" name="f_name">
    <br><br>

    <label for="u_email">Your email</label>
    <input type="email" name="u_email" placeholder="sample@mail.com">
    <br><br>

    <label for="u_phone">Your telephone num</label>
    <input type="tel" name="u_phone" placeholder="+254798765432">
</body>
</html>
